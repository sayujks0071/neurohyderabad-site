name: OpenClaw Sandbox Daily Restart

on:
  schedule:
    # Every day at 4:00 AM IST (22:30 UTC previous day)
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      snapshot_id:
        description: 'Snapshot ID to restore from (leave blank to use default)'
        required: false
        default: 'snap_8PmnfIhAjjhul686vCWLH8zmP2iC'

env:
  SNAPSHOT_ID: ${{ github.event.inputs.snapshot_id || 'snap_8PmnfIhAjjhul686vCWLH8zmP2iC' }}
  OPENCLAW_PORT: '18789'
  # Vercel Sandbox CLI reads this env var for authentication
  VERCEL_AUTH_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  restart-sandbox:
    name: Restart OpenClaw Sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: vercel_token

    steps:
      - name: Install Sandbox CLI
        run: npm install -g sandbox

      - name: Create Sandbox from Snapshot
        id: create_sandbox
        run: |
          OUTPUT=$(sandbox create \
            --snapshot ${{ env.SNAPSHOT_ID }} \
            --timeout 4h \
            --publish-port ${{ env.OPENCLAW_PORT }} \
            --token "$VERCEL_AUTH_TOKEN")
          echo "$OUTPUT"
          SANDBOX_ID=$(echo "$OUTPUT" | grep -oP 'sbx_[a-zA-Z0-9]+' | head -1)
          PUB_URL=$(echo "$OUTPUT" | grep -oP 'https://sb-[a-z0-9]+\.vercel\.run' | head -1)
          echo "sandbox_id=$SANDBOX_ID" >> $GITHUB_OUTPUT
          echo "public_url=$PUB_URL" >> $GITHUB_OUTPUT
          echo "Created: $SANDBOX_ID → $PUB_URL"

      - name: Start OpenClaw Gateway
        run: |
          sleep 5
          sandbox exec ${{ steps.create_sandbox.outputs.sandbox_id }} \
            --token "$VERCEL_AUTH_TOKEN" \
            sh -c "nohup openclaw gateway run > /tmp/gateway.log 2>&1 &"
        continue-on-error: true

      - name: Verify Gateway is Running
        run: |
          sleep 5
          sandbox exec ${{ steps.create_sandbox.outputs.sandbox_id }} \
            --token "$VERCEL_AUTH_TOKEN" \
            cat /tmp/gateway.log
        continue-on-error: true

      - name: Report Status
        if: always()
        run: |
          echo "### OpenClaw Sandbox Restarted" >> $GITHUB_STEP_SUMMARY
          echo "- **Sandbox ID**: ${{ steps.create_sandbox.outputs.sandbox_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: ${{ steps.create_sandbox.outputs.public_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Snapshot**: ${{ env.SNAPSHOT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runs until**: ~4h from now (restarts daily at 4:00 AM IST)" >> $GITHUB_STEP_SUMMARY

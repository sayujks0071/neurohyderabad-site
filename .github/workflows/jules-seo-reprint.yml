name: "Jules: SEO Reprint"

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

env:
  PROMPT_FILE: "jules-prompts/seo-reprint.md"
  ISSUE_TITLE_BASE: "SEO Reprint Task"

permissions:
  contents: read
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Issue
        uses: actions/github-script@v7
        env:
          PROMPT_FILE: ${{ env.PROMPT_FILE }}
          ISSUE_TITLE_BASE: ${{ env.ISSUE_TITLE_BASE }}
        with:
          script: |
            const fs = require('fs');
            const titleBase = process.env.ISSUE_TITLE_BASE;
            const dateStr = new Date().toISOString().split('T')[0];
            const issueTitle = `${titleBase} - ${dateStr}`;

            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);

            // Fetch issues to check for duplicates created within the last 24h
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'jules',
              per_page: 100
            });

            const isDuplicate = issues.some(issue => {
              const createdDate = new Date(issue.created_at);
              return issue.title.includes(titleBase) && createdDate > oneDayAgo;
            });

            if (isDuplicate) {
              console.log(`An open issue with base title "${titleBase}" created in the last 24h already exists. Skipping.`);
              return;
            }

            let body;
            try {
              body = fs.readFileSync(process.env.PROMPT_FILE, 'utf8');
            } catch (error) {
              console.error(`Failed to read prompt file ${process.env.PROMPT_FILE}: ${error.message}`);
              core.setFailed(`Prompt file missing or unreadable: ${process.env.PROMPT_FILE}`);
              return;
            }

            // Ensure label 'jules' exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'jules'
              });
            } catch (error) {
              if (error.status === 404) {
                console.log("Label 'jules' not found. Creating it...");
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'jules',
                  color: '0052cc',
                  description: 'Automated tasks for Jules'
                });
              } else {
                throw error;
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: body,
              labels: ['jules']
            });

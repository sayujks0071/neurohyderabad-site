name: OpenClaw GWS Daily Automation

on:
  schedule:
    # Run every day at 1:00 AM IST (19:30 UTC previous day)
    - cron: '30 19 * * *'
  workflow_dispatch: # Allow manual triggering

env:
  # Provide required environment variables
  SHEET_ID: ${{ secrets.GWS_SHEET_ID }}
  # Define DB Connection String if needed by db lib
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  daily-automations:
    name: Run Daily GWS Automations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # In a real environment, the gws CLI needs to be installed and authenticated
      # Here we assume it is either mockable, available via an action, or we install it
      # - name: Install GWS CLI
      #   run: npm install -g @google/gws-cli
      # - name: Authenticate GWS
      #   run: echo "${{ secrets.GWS_CREDENTIALS }}" > /tmp/gws-creds.json && gws auth login --credentials /tmp/gws-creds.json

      - name: Sync New Appointments to Calendar & Sheets
        run: npx tsx openclaw/workflows/sync-new-appointments.ts
        continue-on-error: true # Do not fail the whole workflow if this script fails

      - name: Send Automated Appointment Reminders
        run: npx tsx openclaw/workflows/send-reminders.ts
        continue-on-error: true

      - name: Report Status
        if: always()
        run: |
          echo "### OpenClaw GWS Automation Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Appointments Synced**: Ran \`sync-new-appointments.ts\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Reminders Sent**: Ran \`send-reminders.ts\`" >> $GITHUB_STEP_SUMMARY

name: OpenClaw Daily QA and WhatsApp Reminder

on:
  schedule:
    # Every day at 8:00 PM IST (14:30 UTC)
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  daily-qa-whatsapp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Daily QA and WhatsApp Reminders
        run: npx tsx openclaw/workflows/daily-qa-whatsapp.ts

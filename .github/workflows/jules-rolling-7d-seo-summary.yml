name: Jules Rolling 7D SEO Summary

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  PROMPT_FILE: jules-prompts/rolling-7d-seo-summary.md
  ISSUE_TITLE: Rolling 7D SEO Summary Task

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // 1) Read prompt file
            const promptPath = path.join(process.env.GITHUB_WORKSPACE, process.env.PROMPT_FILE);
            const issueBody = fs.readFileSync(promptPath, 'utf8');

            // 2) Build Title
            const dateStr = new Date().toISOString().split('T')[0];
            const issueTitle = `${process.env.ISSUE_TITLE} - ${dateStr}`;

            // 3) Avoid duplicates
            const issuesRes = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'jules',
              per_page: 50
            });

            const yesterday = new Date();
            yesterday.setHours(yesterday.getHours() - 24);

            const recentDuplicate = issuesRes.data.find(issue => {
              if (issue.pull_request) return false;
              if (!issue.title.startsWith(process.env.ISSUE_TITLE)) return false;
              const createdDate = new Date(issue.created_at);
              return createdDate > yesterday;
            });

            if (recentDuplicate) {
              console.log(`An open issue already exists within the last 24h: ${recentDuplicate.html_url}`);
              return;
            }

            // 4) Ensure Label Exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'jules'
              });
            } catch (error) {
              if (error.status === 404) {
                console.log('Creating "jules" label...');
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'jules',
                  color: '0366d6',
                  description: 'Tasks for the Jules automated agent'
                });
              } else {
                throw error;
              }
            }

            // 5) Create Issue
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['jules']
            });

            console.log(`Created issue: ${newIssue.data.html_url}`);
